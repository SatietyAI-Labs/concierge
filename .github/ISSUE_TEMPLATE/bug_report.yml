name: Bug report
description: Report a bug or unexpected behavior in Concierge
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A short summary of what's going wrong.
      placeholder: e.g. /recommend returns 500 when memory store is offline
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the bug.
      placeholder: |
        1. uv sync
        2. uv run uvicorn ui.app:create_app --factory --port 8000
        3. Open http://localhost:8000
        4. ...
    validations:
      required: true
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs. actual behavior
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: input
    id: concierge-version
    attributes:
      label: Concierge version
      description: Output of `git rev-parse HEAD` or the release tag.
      placeholder: e.g. 0.1.0 or commit SHA
  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python --version`.
      placeholder: e.g. 3.12.3
    validations:
      required: true
  - type: checkboxes
    id: os
    attributes:
      label: Operating system
      options:
        - label: WSL2
        - label: macOS
        - label: Linux (native)
        - label: Windows (native)
    validations:
      required: true
  - type: checkboxes
    id: harness
    attributes:
      label: AI harness
      options:
        - label: Claude Code
        - label: Claude Desktop
        - label: Other MCP host
        - label: N/A (Concierge service only)
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots (optional)
      description: Relevant log output or screenshots that help diagnose the issue.
