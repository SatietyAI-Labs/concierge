name: Feature request
description: Propose a new capability or enhancement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Who is affected and how often does it come up?
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What would you like Concierge to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        What alternatives did you consider? Concierge uses surface-then-execute
        discipline — name the forks you considered and why you'd choose this
        path over the others.
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context (optional)
      description: Any other context, screenshots, or links relevant to the request.
